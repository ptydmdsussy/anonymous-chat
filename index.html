<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anonymous Chat</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f0f0f;
  color: white;
}

/* HEADER */
.header {
  background: #1f1f1f;
  padding: 15px;
  text-align: center;
  font-size: 18px;
  font-weight: bold;
}

/* CHAT BOX */
.chat-box {
  height: calc(100vh - 140px);
  overflow-y: auto;
  padding: 10px;
}

/* MESSAGE */
.msg {
  background: #2a2a2a;
  padding: 10px;
  margin: 8px 0;
  border-radius: 10px;
  max-width: 80%;
}

.msg .user {
  font-size: 12px;
  color: #aaa;
  margin-bottom: 5px;
}

/* INPUT AREA */
.input-area {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
  padding: 10px;
  background: #1f1f1f;
}

.input-area input {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 8px;
  outline: none;
}

.input-area button {
  margin-left: 10px;
  padding: 12px 15px;
  border: none;
  background: #00c896;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}

.input-area button:hover {
  background: #00a87a;
}

/* SMALL TEXT */
.small {
  text-align: center;
  font-size: 11px;
  color: #777;
  margin-top: 5px;
}
</style>
</head>

<body>

<div class="header">
👻 Anonymous Chat Room
</div>

<div class="chat-box" id="chatBox">

  <div class="msg">
    <div class="user">User_1023</div>
    Hello guys 👋
  </div>

  <div class="msg">
    <div class="user">User_8841</div>
    Anyone here?
  </div>

</div>

<!-- INPUT -->
<div class="input-area">
  <input type="text" id="messageInput" placeholder="Type message...">
  <button onclick="sendMessage()">Send</button>
</div>

<div class="small">
Stay anonymous • Be respectful • No spam
</div>

<script>
function sendMessage() {
  const input = document.getElementById("messageInput");
  const chatBox = document.getElementById("chatBox");

  if (input.value.trim() === "") return;

  // create message box
  const msg = document.createElement("div");
  msg.classList.add("msg");

  const user = "User_" + Math.floor(Math.random() * 9999);

  msg.innerHTML = `
    <div class="user">${user}</div>
    ${input.value}
  `;

  chatBox.appendChild(msg);

  input.value = "";

  // scroll bottom
  chatBox.scrollTop = chatBox.scrollHeight;
}
</script>

</body>
</html>
